<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<title>战斗测试</title>
<style>
body{margin:0;background:#1a1a2e;color:white;font-family:Arial}
.nav{position:fixed;bottom:0;left:0;right:0;background:#000;display:flex;justify-content:space-around;padding:10px}
.nav-item{text-align:center;color:#666;cursor:pointer}
.nav-item.active{color:#FFD700}
.page{display:none;padding:20px}
.page.active{display:block}
.card{background:rgba(255,255,255,0.1);border-radius:8px;padding:15px;margin:10px 0}
.btn{padding:10px 20px;border:none;border-radius:20px;cursor:pointer;margin:5px;background:#6B5BFF;color:white}
</style>
</head>
<body>
<div id="loginPage" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center">
<h1>🌌 星座帝国</h1>
<button class="btn" onclick="login()" style="margin-top:20px">🔐 微信登录</button>
</div>

<div id="mainPage" style="display:none">
<div id="page-home" class="page active">
<h2>🏠 首页</h2>
<div class="card"><p>欢迎！点击下方导航开始游戏</p></div>
</div>

<div id="page-battle" class="page">
<h2>⚔️ 战斗竞技场</h2>
<div class="card"><p>我的战力：<span id="myPower">0</span></p></div>
<button class="btn" onclick="loadBattle()">🔄 刷新排行榜</button>
<div id="battleList"></div>
</div>

<div class="nav">
<div class="nav-item active" onclick="showPage('home')">🏠<br><small>首页</small></div>
<div class="nav-item" onclick="showPage('battle')">⚔️<br><small>战斗</small></div>
</div>
</div>

<script>
const API='http://localhost:3000/v1';
let token=localStorage.getItem('zodiac_token')||'';
let user=null;

async function api(m,p,d){
const h={'Content-Type':'application/json'};
if(token)h['Authorization']='Bearer '+token;
const body=(m==='GET'||m==='HEAD')?null:(d?JSON.stringify(d):null);
const r=await fetch(API+p,{method:m,headers:h,body:body});
const j=await r.json();
if(j.code!==0)throw new Error(j.message);
return j.data;
}

async function login(){
try{
const r=await api('POST','/auth/wechat/login',{code:'test'});
token=r.access_token;user=r.user;
localStorage.setItem('zodiac_token',token);
document.getElementById('loginPage').style.display='none';
document.getElementById('mainPage').style.display='block';
document.getElementById('myPower').textContent=user.power||0;
showPage('battle');
}catch(e){alert('登录失败：'+e.message);}
}

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
document.getElementById('page-'+id).classList.add('active');
event.currentTarget.classList.add('active');
if(id==='battle')loadBattle();
}

async function loadBattle(){
try{
const r=await api('GET','/battle/ranking',{});
document.getElementById('battleList').innerHTML=(r||[]).map(p=>
'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;">'+
'<div>'+(p.nickname||'玩家')+' Lv.'+(p.level||1)+' 战力:'+p.power+'</div>'+
'<button class="btn" onclick="attack('+p.id+',\''+(p.nickname||'玩家')+'\')">⚔️ 攻击</button></div></div>'
).join('')||'<p>暂无数据</p>';
}catch(e){document.getElementById('battleList').innerHTML='<p>加载失败：'+e.message+'</p>';}
}

async function attack(id,name){
if(!confirm('攻击 '+name+' ?'))return;
try{
const r=await api('POST','/battle/execute',{battleId:Date.now()});
alert(r.result==='win'?'🎉 胜利！':'💔 失败！');
loadBattle();
}catch(e){alert('战斗失败：'+e.message);}
}

window.addEventListener('DOMContentLoaded',()=>{
if(token){
document.getElementById('loginPage').style.display='none';
document.getElementById('mainPage').style.display='block';
showPage('battle');
}
});
</script>
</body>
</html>
